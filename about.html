<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Free-Edu Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010816;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #3a86ff;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
        }
        @keyframes rotateBorder { 100% { transform: rotate(360deg); } }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        html, body {
            height: auto;
            background: transparent;
            color: var(--text-main);
            overflow: hidden;
        }

        .popup-wrap {
            width: 100%;
            background: #0a111a;
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .about-scroll-container {
            overflow-y: auto;
            overflow-x: hidden;
            width: 100%;
            display: flex;
            flex-direction: column;
            scrollbar-width: none;
        }
        .about-scroll-container::-webkit-scrollbar { display: none; }

        /* Banner */
        .banner {
            height: 140px;
            background: linear-gradient(45deg, #010816 0%, #1a2233 100%);
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
        }
        .banner-dots {
            position: absolute;
            inset: 0;
            opacity: 0.3;
            background-image: radial-gradient(var(--accent) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .banner-fade {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 60px;
            background: linear-gradient(to top, #0a111a, transparent);
        }

        /* Profile */
        .profile {
            padding: 25px;
            text-align: center;
            position: relative;
        }

        .pp-container {
            width: 130px;
            height: 130px;
            margin: -85px auto 20px;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            border: 4px solid var(--accent);
            background: #010816;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(58,134,255,0.5);
            position: relative;
            z-index: 10;
        }
        .pp-container img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .dev-name {
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            margin-bottom: 2px;
        }

        .dev-role {
            color: var(--accent);
            font-family: 'Syncopate', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 3px;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .contributor-btn {
            display: inline-block;
            text-decoration: none;
            padding: 10px 20px;
            margin-bottom: 20px;
            border-radius: 30px;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.6rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: white;
            position: relative;
            background: #010816;
            z-index: 1;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .contributor-btn::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--accent), transparent, #e73c7e, transparent);
            animation: rotateBorder 4s linear infinite;
            z-index: -2;
        }
        .contributor-btn::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: #010816;
            border-radius: 28px;
            z-index: -1;
        }
        .contributor-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(58,134,255,0.4);
        }

        .bio {
            color: var(--text-dim);
            line-height: 1.6;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .group-label {
            color: var(--text-main);
            font-size: 0.6rem;
            font-weight: 800;
            margin-bottom: 15px;
            font-family: 'Syncopate', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .group-label::before, .group-label::after {
            content: "";
            height: 1px;
            width: 20px;
            background: var(--glass-border);
        }

        .social-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }
        .social-row a { display: flex; align-items: center; justify-content: center; }

        .close-btn {
            margin: 0 25px 25px;
            background: var(--accent);
            border: none;
            padding: 12px 30px;
            color: white;
            border-radius: 15px;
            cursor: pointer;
            width: calc(100% - 50px);
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .close-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(58,134,255,0.4);
        }
    </style>
</head>
<body>

</body>
</html>
