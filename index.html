<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economics | Free-Edu Portal</title>
    <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/512/3197/3197967.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010816;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #3a86ff;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --danger: #ff4d4d;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* ================================================
           AMBIENT GLOW
        ================================================ */
        .ambient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(58,134,255,0.08), transparent 40%);
            z-index: -2;
            pointer-events: none;
        }

        /* ================================================
           ANIMATIONS
        ================================================ */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.05); }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to   { opacity: 0; }
        }
        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* ================================================
           HOLOGRAM LOGO ANIMATIONS
        ================================================ */
        @keyframes holoShimmer {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes holoGlow {
            0%, 100% { text-shadow: 0 0 8px rgba(58,134,255,0.6), 0 0 20px rgba(58,134,255,0.3); }
            50%       { text-shadow: 0 0 15px rgba(58,134,255,1), 0 0 40px rgba(58,134,255,0.6), 0 0 60px rgba(100,180,255,0.3); }
        }
        @keyframes holoScan {
            0%   { top: -10%; opacity: 0.6; }
            100% { top: 110%; opacity: 0; }
        }
        @keyframes holoPulse {
            0%, 100% { opacity: 1; transform: scaleX(1); }
            50%       { opacity: 0.5; transform: scaleX(0.97); }
        }
        @keyframes rotateBorder { 100% { transform: rotate(360deg); } }

        /* ================================================
           STICKY NAVBAR
        ================================================ */
        #nav-wrapper {
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
            background: transparent;
        }

        nav {
            position: relative;
            top: 0;
            z-index: 100;
            max-width: 1200px;
            margin: 10px auto 18px;
            padding: 15px 25px;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            animation: slideInDown 0.6s ease;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        nav.nav-hidden {
            opacity: 0;
            transform: translateY(-110%);
            pointer-events: none;
        }

        /* ================================================
           HOLOGRAM LOGO
        ================================================ */
        .logo-link {
            text-decoration: none;
            display: flex;
            align-items: center;
            animation: slideInLeft 0.6s ease;
        }

        .logo-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            overflow: visible;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            position: relative;
            flex-shrink: 0;
            border-radius: 8px;
            overflow: hidden;
            filter: drop-shadow(0 0 6px rgba(58,134,255,0.6));
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 3px;
            background: linear-gradient(
                90deg,
                #3a86ff 0%,
                #a8cfff 20%,
                #ffffff 35%,
                #7ec8ff 50%,
                #3a86ff 65%,
                #c0e0ff 80%,
                #3a86ff 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: holoShimmer 3s linear infinite, holoGlow 2.5s ease-in-out infinite, holoPulse 4s ease-in-out infinite;
            position: relative;
        }

        .logo-wrap::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(58,134,255,0.9), rgba(200,230,255,0.8), transparent);
            animation: holoScan 2.2s linear infinite;
            pointer-events: none;
            z-index: 10;
        }

        .logo-sub {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.38rem;
            letter-spacing: 3px;
            color: rgba(58,134,255,0.6);
            text-transform: uppercase;
            white-space: nowrap;
            display: block;
            margin-top: 2px;
            margin-left: 1px;
        }

        /* ================================================
           SEARCH
        ================================================ */
        .search-container {
            flex: 1;
            max-width: 450px;
            order: 2;
            margin: 0 20px;
            animation: scaleIn 0.6s ease 0.1s backwards;
        }
        .search-bar {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px 20px;
            color: white;
            outline: none;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .search-bar::placeholder { color: var(--text-dim); }
        .search-bar:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.05);
        }

        /* ================================================
           NAV BUTTONS
        ================================================ */
        .nav-actions {
            order: 3;
            display: flex;
            gap: 10px;
            animation: slideInRight 0.6s ease 0.1s backwards;
        }
        .nav-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(58,134,255,0.3);
        }

        /* ================================================
           YEAR TABS
        ================================================ */
        .tabs-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 800px;
            margin: 50px auto 40px;
            padding: 0 20px;
            animation: fadeInUp 0.7s ease 0.2s backwards;
        }
        .tab-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 14px 10px;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
        }
        .tab-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(58,134,255,0.3);
            animation: pulse 0.5s ease;
        }

        /* ================================================
           SUBJECT GRID & CARDS
        ================================================ */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 80px; }

        .subject-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            animation: fadeInUp 0.7s ease 0.3s backwards;
        }

        .subject-card {
            position: relative;
            background: #0a111a;
            border: 1px solid var(--glass-border);
            padding: 50px 25px;
            border-radius: 28px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
            text-decoration: none;
            color: white;
            overflow: hidden;
        }
        .subject-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--bg-img);
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            z-index: 1;
            transition: transform 0.6s ease;
        }
        .subject-card h3, .subject-card span {
            position: relative;
            z-index: 2;
        }
        .subject-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(58,134,255,0.2);
        }
        .subject-card:hover::before { transform: scale(1.1); opacity: 0.5; }

        .subject-card h3 { font-size: 1.2rem; margin-bottom: 8px; font-weight: 600; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .subject-card span { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 10px; }

        /* ================================================
           HIDDEN / REVEAL
        ================================================ */
        .hidden {
            display: none !important;
            opacity: 0;
            animation: fadeOut 0.3s ease;
        }
        .reveal { opacity: 0; transform: translateY(20px); transition: 0.8s ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* ================================================
           IFRAME POPUP OVERLAY
        ================================================ */
        #popup-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #popup-overlay.active {
            display: flex;
        }
        #popup-overlay.visible {
            opacity: 1;
        }

        #popup-frame-wrap {
            width: 100%;
            max-width: 550px;
            max-height: 90vh;
            border-radius: 30px;
            overflow: hidden;
            transform: scale(0.85);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }
        #popup-overlay.visible #popup-frame-wrap {
            transform: scale(1);
            opacity: 1;
        }

        /* About popup is a bit narrower */
        #popup-overlay.about-mode #popup-frame-wrap {
            max-width: 480px;
        }

        #popup-iframe {
            width: 100%;
            height: 85vh;
            max-height: 85vh;
            border: none;
            display: block;
            border-radius: 30px;
        }

        /* About iframe shrinks to content */
        #popup-overlay.about-mode #popup-iframe {
            height: auto;
            max-height: 90vh;
        }

        /* ================================================
           RESPONSIVE
        ================================================ */
        @media (max-width: 1024px) {
            .subject-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            nav { width: 95%; gap: 12px; padding: 15px; }
            .logo-link { order: 1; }
            .nav-actions { order: 2; }
            .search-container { order: 3; max-width: 100%; width: 100%; margin: 5px 0 0 0; }
            .nav-btn { padding: 8px 10px; font-size: 0.6rem; }
            .tabs-container { grid-template-columns: repeat(2, 1fr); }
            .subject-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .subject-card { padding: 35px 15px; border-radius: 20px; }
            .subject-card h3 { font-size: 0.85rem; }
            .subject-card span { font-size: 0.6rem; }
        }
        @media (max-width: 480px) {
            #popup-frame-wrap { border-radius: 20px; }
            #popup-iframe { border-radius: 20px; max-height: 90vh; height: 90vh; }
        }
    </style>
</head>

            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';

            // Auto-resize iframe to content height (works same-origin)
            iframe.onload = function() {
                if (modeClass === 'about-mode') {
                    try {
                        const h = iframe.contentDocument.body.scrollHeight;
                        iframe.style.height = h + 'px';
                    } catch(e) {}
                }
            };

            requestAnimationFrame(() => {
                requestAnimationFrame(() => overlay.classList.add('visible'));
            });
        }

        function closePopup() {
            const overlay = document.getElementById('popup-overlay');
            const iframe  = document.getElementById('popup-iframe');

            overlay.classList.remove('visible');
            document.body.style.overflow = '';

            // Wait for fade out, then hide and clear src
            setTimeout(() => {
                overlay.classList.remove('active');
                iframe.src = '';
            }, 350);
        }

        /* --------------------------------------------------
           Year tab switching
        -------------------------------------------------- */
        function showYear(yearNum, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.year-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('year' + yearNum).classList.remove('hidden');
        }

        /* --------------------------------------------------
           Subject search
        -------------------------------------------------- */
        function filterSubjects(query) {
            const input = query.toLowerCase();
            document.querySelectorAll('.subject-card').forEach(card => {
                const name = card.getAttribute('data-name') || '';
                const hide = !name.includes(input);
                card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                if (hide) {
                    card.classList.add('hidden');
                    card.style.opacity = '0.3';
                } else {
                    card.classList.remove('hidden');
                    card.style.opacity = '1';
                }
            });
        }

        /* --------------------------------------------------
           Scroll reveal for cards
        -------------------------------------------------- */
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        /* --------------------------------------------------
           Hide nav on scroll down, show on scroll up
        -------------------------------------------------- */
        (function() {
            let lastY = 0;
            let ticking = false;
            const THRESHOLD = 8;

            window.addEventListener('scroll', function() {
                if (ticking) return;
                ticking = true;
                requestAnimationFrame(function() {
                    const currentY = window.scrollY;
                    const nav = document.getElementById('navbar');
                    if (!nav) { ticking = false; return; }

                    if (currentY > lastY + THRESHOLD && currentY > 60) {
                        nav.classList.add('nav-hidden');
                    } else if (currentY < lastY - THRESHOLD) {
                        nav.classList.remove('nav-hidden');
                    }
                    lastY = currentY;
                    ticking = false;
                });
            }, { passive: true });
        })();

        /* --------------------------------------------------
           Close popup on Escape key
        -------------------------------------------------- */
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closePopup();
        });
    </script>
</body>
</html>
